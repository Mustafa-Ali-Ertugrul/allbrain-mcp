[mcp_servers.allbrain]
command = "uv"
args = [
    "run",
    "--project",
    ".",
    "allbrain",
    "start",
    "--project",
    ".",
    "--agent",
    "codex",
    "--db-path",
    ".allbrain.db",
]
cwd = "."
startup_timeout_sec = 60
tool_timeout_sec = 120
enabled = true
required = false

[mcp_servers.allbrain.env]
PYTHONUTF8 = "1"
PYTHONIOENCODING = "utf-8"
