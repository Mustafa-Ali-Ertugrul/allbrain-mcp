[mcp_servers.allbrain]
command = "C:/ABMCP/.venv/Scripts/python.exe"
args = [
    "-m",
    "allbrain.cli.main",
    "start",
    "--project",
    "C:/ABMCP",
    "--agent",
    "codex",
    "--db-path",
    "C:/ABMCP/.allbrain.db",
]
cwd = "C:/ABMCP"
startup_timeout_sec = 60
tool_timeout_sec = 120
enabled = true
required = false

[mcp_servers.allbrain.env]
PYTHONPATH = "C:/ABMCP/src"
PYTHONUTF8 = "1"
PYTHONIOENCODING = "utf-8"
