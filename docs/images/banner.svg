<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">AllBrain MCP</title>
  <desc id="desc">A banner for the AllBrain MCP repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.2  0 1 0 0 0.6  0 0 1 0 1  0 0 0 0.7 0"/>
    </filter>
  </defs>

  <rect width="1600" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="1290" cy="110" r="86" fill="#38bdf8" opacity="0.16" filter="url(#glow)"/>
  <circle cx="1410" cy="320" r="110" fill="#8b5cf6" opacity="0.14" filter="url(#glow)"/>
  <circle cx="220" cy="320" r="120" fill="#22c55e" opacity="0.10" filter="url(#glow)"/>

  <g transform="translate(120 102)">
    <rect x="0" y="42" width="120" height="120" rx="28" fill="none" stroke="url(#accent)" stroke-width="4"/>
    <path d="M30 90c10-26 25-38 50-38s40 12 50 38c-10 26-25 38-50 38S40 116 30 90Z" fill="none" stroke="#e2e8f0" stroke-width="4"/>
    <circle cx="70" cy="90" r="18" fill="url(#accent)"/>
    <path d="M60 20v20M100 48l14-14M112 90h20M100 132l14 14M60 160v20M20 132l-14 14M8 90H-12M20 48L6 34" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="320" y="168" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="74" font-weight="700">AllBrain MCP</text>
  <text x="320" y="228" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30">Event-sourced memory for multi-agent work</text>
  <text x="320" y="278" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Codex • Claude Code • Antigravity • stdio MCP</text>
</svg>
