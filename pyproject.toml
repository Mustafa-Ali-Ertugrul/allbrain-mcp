[project]
name = "allbrain-mcp"
version = "0.1.0"
description = "One Brain. Multiple Agents."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=2.0.0",
    "GitPython>=3.1.0",
    "pydantic>=2.0.0",
    "rich>=13.0.0",
    "sqlmodel>=0.0.22",
    "typer>=0.12.0",
    "uuid6>=2024.7.10",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
allbrain = "allbrain.cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/allbrain"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
asyncio_mode = "auto"
