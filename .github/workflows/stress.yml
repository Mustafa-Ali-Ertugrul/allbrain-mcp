name: Nightly Stress

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  UV_VERSION: "0.6.x"
  PYTHON_VERSION: "3.13"
  # Hosted-runner latency fluctuates; recent healthy runs reached 248-262 ms
  # with 100% success and no DB locks. Keep a small margin above that noise.
  MCP_STRESS_P95_BUDGET_SECONDS: "0.300"

jobs:
  stress-a:
    name: Stress A — Concurrent DB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run python scripts/stress_test.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-report-a
          path: scripts/stress_report.json

  stress-b:
    name: Stress B — MCP Protocol
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run python scripts/mcp_stress_test.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-report-b
          path: scripts/mcp_stress_report.json
