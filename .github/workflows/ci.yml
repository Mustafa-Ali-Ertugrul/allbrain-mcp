name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  UV_VERSION: "0.6.x"
  PYTHON_VERSION: "3.13"
  ALLOWED_PROJECT_ROOTS: "/home/runner:/tmp"

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run pyright
      - run: uv run python scripts/check_complexity.py
      - run: uv run python scripts/check_architecture.py
      - run: uv run python scripts/check_maturity.py
      - run: uv run python scripts/check_readme_commands.py

  security:
    name: Security (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run bandit -c pyproject.toml -r src/ -ll

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=80 -n auto --dist=worksteal

  postgres-contract:
    name: PostgreSQL storage contract
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: allbrain
          POSTGRES_PASSWORD: allbrain
          POSTGRES_DB: allbrain
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U allbrain -d allbrain"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ALLBRAIN_TEST_POSTGRES_URL: postgresql+psycopg://allbrain:allbrain@localhost:5432/allbrain
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --group dev --extra postgres
      - run: uv run pytest -q -n 0 tests/integration/test_postgres_storage.py
      - run: uv run pytest -q -n 0 tests/test_merge_server_regression.py
      - run: uv run pytest -q -n 0 tests/test_sdist_contents.py

  installer-smoke:
    name: Installer smoke test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --group dev
      - name: Smoke test — CLI available
        run: uv run allbrain --help
      - name: Smoke test — start command registered
        run: uv run allbrain start --help
      - name: Smoke test — installer runs without crash
        run: uv run python scripts/install_mcp_clients.py --help

  broker-contracts:
    name: Experimental broker contracts
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:4-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      ALLBRAIN_TEST_REDIS_URL: redis://localhost:6379/0
      ALLBRAIN_TEST_AMQP_URL: amqp://guest:guest@localhost:5672/
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --group dev --extra distributed
      - run: uv run pytest -q -n 0 tests/integration/test_distributed_brokers.py
