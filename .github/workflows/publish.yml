name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Publish to TestPyPI instead of production"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  UV_VERSION: "0.6.x"
  PYTHON_VERSION: "3.13"

jobs:
  checks:
    name: Pre-publish checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run pytest -q tests/test_merge_server_regression.py tests/test_sdist_contents.py

  build-and-publish:
    name: Build & publish
    runs-on: ubuntu-latest
    needs: [checks]
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - run: uv sync --group dev

      - run: uv build

      - name: Verify sdist has no node_modules
        run: |
          sdist=$(ls dist/*.tar.gz)
          if tar -tzf "$sdist" | grep -q "node_modules"; then
            echo "::error::sdist contains node_modules"
            exit 1
          fi

      - name: Wheel smoke — install and CLI help
        run: |
          uvx --from dist/*.whl allbrain --help

      - name: Publish to TestPyPI (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI (production)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1