name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

env:
  UV_VERSION: "0.6.x"
  PYTHON_VERSION: "3.13"

jobs:
  build-and-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    needs: [lint, test]   # Wait for CI to pass
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - run: uv sync --group dev

      - run: uv build

      - name: Verify sdist has no node_modules
        run: |
          sdist=$(ls dist/*.tar.gz)
          if tar -tzf "$sdist" | grep -q "node_modules"; then
            echo "::error::sdist contains node_modules"
            exit 1
          fi

      - name: Wheel smoke — install and CLI help
        run: |
          uvx --from dist/*.whl allbrain --help

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1