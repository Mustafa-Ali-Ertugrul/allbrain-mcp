[project]
name = "allbrain-sdk"
version = "0.1.0"
description = "Typed async Python client for AllBrain MCP"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=3.4.2,<4.0",
    "pydantic>=2.10,<3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/allbrain_sdk"]
